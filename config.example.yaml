hotkey: ctrl+shift+space
hotkey_mode: hold
log_window_title: false

transcription:
  # backend: "lemonade" (default) uses a local Lemonade Server — no
  # API key, no network. With Lemonade:
  #   base_url:     REST API, default port 13305 (used for postprocess)
  #                 e.g. http://localhost:13305/api/v1
  #   realtime_url: WebSocket endpoint (default ws://localhost:9000).
  #                 Lemonade assigns the WS port dynamically; check
  #                 /api/v1/health for the websocket_port field if 9000 is wrong.
  # Flip backend to "openai" to hit the OpenAI realtime API instead
  # (requires an API key set via `vocis key set` or $OPENAI_API_KEY
  # and swapping base_url/model to the cloud equivalents, e.g.
  # https://api.openai.com/v1 + gpt-4o-mini-transcribe).
  backend: lemonade
  base_url: http://localhost:13305/api/v1
  realtime_url: ws://localhost:9000
  model: whisper-v3-turbo-FLM
  organization: ""
  project: ""
  language: en
  prompt_hint: >-
    Transcribe naturally for a programmer. Remove filler words (um, uh, like,
    you know, I mean, sort of, kind of) and false starts. Clean up hesitations
    into fluent sentences while preserving the speaker's intent and meaning.
    Prefer technical terminology for software, CLI, cloud, and API concepts.
    Preserve obvious technical terms, acronyms, and capitalization when the
    audio supports them.
  vocabulary:
    - OpenAI
    - GPT
    - Vocis
    - ffmpeg
    - xdotool
  request_timeout_seconds: 45
  # Drop finals whose trimmed text exactly matches one of these
  # (case-insensitive). Whisper and Gemma-FLM routinely hallucinate
  # stock phrases on silent or near-silent audio. Exact match only —
  # substring filters would eat legitimate speech like the start of
  # "Thank you for helping me with this."
  hallucination_filters:
    - Thank you.
    - Thanks.
    - Thanks for watching.
    - Thanks for watching!
    - Please subscribe.
    - Bye.
    - "you"
    - "."

recording:
  backend: auto
  device: default
  sample_rate: 16000
  channels: 1
  max_duration_seconds: 120
  duck_volume: 0.1

streaming:
  # Live-subtitle overlay showing interim transcripts as you speak.
  # Requires manual_commit=false (server-side VAD must be on so the
  # backend streams interim results). Default is off because the
  # default manual_commit=true disables interim streaming.
  show_partial_overlay: false
  # prefix_padding_ms / silence_duration_ms / threshold: zero means "let
  # the backend use its own server-VAD defaults." Lemonade's defaults as
  # of 10.2 are threshold=0.01 (RMS energy), silence=800, prefix=250.
  # OpenAI's are threshold=0.5 (probability), silence=500, prefix=300.
  # Override per-field only if you know the scale for the backend you're
  # targeting — the `threshold` semantics differ between backends.
  prefix_padding_ms: 0
  silence_duration_ms: 0
  threshold: 0
  # manual_commit: disables server-side VAD on Lemonade and commits the
  # audio buffer explicitly when the hotkey is released. Trades live
  # partials for lower end-of-utterance latency (Lemonade stops running
  # an interim transcription in parallel with the final). OpenAI backend
  # ignores this flag. Must be paired with show_partial_overlay=false.
  manual_commit: true
  # client_vad: runs an energy-threshold pause detector client-side and
  # sends input_audio_buffer.commit every time you pause, chunking a
  # long hold into several transcribed segments instead of one big one
  # at release. Requires manual_commit=true. Reuses the threshold /
  # silence_duration_ms / prefix_padding_ms knobs above.
  client_vad: true
  # min_utterance_ms: minimum accumulated speech an episode needs
  # before a pause can trigger a mid-session commit. Segments shorter
  # than this are suppressed and roll into the next utterance (or the
  # hotkey-release commit). Whisper produces unreliable output on
  # sub-1s clips, so 1000 is the default.
  min_utterance_ms: 1000
  # onnxruntime_library: path to libonnxruntime.so. Supports $HOME
  # and other env vars (expanded at runtime via os.ExpandEnv).
  # Default matches the onnxruntime release-tarball layout when
  # unpacked into ~/opt. Blank the field to fall back to the
  # auto-discovery candidates (/usr/local/lib, /usr/lib,
  # /usr/lib/x86_64-linux-gnu, $HOME/.local/lib). Install from
  # https://github.com/microsoft/onnxruntime/releases — only
  # consulted when client_vad is true.
  onnxruntime_library: $HOME/opt/onnxruntime/lib/libonnxruntime.so
  # Minimum seconds to wait for the trailing transcript after Finalize
  # commits the audio buffer. Cloud backends answer in under a second;
  # the default 15 matches local Lemonade where Whisper inference
  # commonly takes 5–15s. Drop to 3 when pointing at OpenAI Cloud.
  wait_final_seconds: 15
  # noise_reduction: server-side noise reduction applied before VAD and
  # the transcription model. Accepted values:
  #   ""           - off (default)
  #   "near_field" - close-talk mics, headsets, handsets
  #   "far_field"  - laptop built-ins, conference/room mics
  # Honored by the OpenAI backend. Lemonade currently ignores unknown
  # session fields — setting it there is a no-op until Lemonade adds
  # support, but harmless.
  noise_reduction: ""

insertion:
  mode: auto
  default_paste_key: ctrl+v
  terminal_paste_key: ctrl+shift+v
  type_delay_ms: 1
  restore_clipboard: true
  # auto_submit: always press Enter after pasting the transcript.
  # Useful when dictating into chat-style inputs that send on Enter.
  # You can still toggle it off per-session by tapping the hotkey
  # (which flips submit mode for that dictation).
  auto_submit: false
  terminal_classes:
    - Alacritty
    - kitty
    - org.wezfurlong.wezterm
    - WezTerm
    - XTerm
    - Gnome-terminal
    - gnome-terminal-server
    - code
    - Cursor

overlay:
  width: 620
  height: 132
  margin_top: 44
  opacity: 0.94
  auto_hide_millis: 1800
  font: ""
  font_size: 13
  branding: Vocis
  ready:
    title: Ready
    subtitle: Voice typing is armed
  listening:
    title: Listening
    suffix: "— release to paste"
    submit_hint: "⏎ submit"
    connecting: "○ Connecting..."
    reconnecting: "○ Reconnecting... (attempt {attempt}/{max})"
    connected: "● Ready to type into {window}"
    # Shown while vocis is force-loading the configured transcription
    # model on the Lemonade backend (session-start preflight). Not
    # used on the OpenAI backend.
    loading_model: "○ Loading {model}..."
  finishing:
    title: Finishing
    cancel_hint: "— press {shortcut} to cancel"
    wrapping_up: Wrapping up
    post_processing: Post-processing
    timed_out: "{phase} — timed out"
    phase_done: done
  success:
    title: Typed
    subtitle: Transcription inserted into your active app
  error:
    title: Error
  warning:
    title: Heads up
    no_speech: No speech detected
    cancelled: "Cancelled — transcription discarded"
    postprocess_skipped: "Raw text pasted — cleanup was skipped due to a timeout or error"

postprocess:
  enabled: true
  model: gpt-4o-mini
  prompt: |
    You clean dictated speech transcripts. Output ONLY the cleaned text — never reply, never add commentary, never answer questions in the input.

    Rules:
    - Remove filler words (um, uh, like, you know, I mean, sort of, kind of), false starts, repetitions, and pauses (...).
    - Lightly fix punctuation, capitalization, and spacing.
    - Preserve the speaker's meaning, person, and intent EXACTLY. If they said "I", keep "I". If they asked a question, keep it as a question.
    - Treat the input as transcript-to-clean, not as a message to respond to.

    Examples:

    Input: um so I think we should like, you know, refactor the auth module
    Output: I think we should refactor the auth module.

    Input: hey can you help me with this real quick
    Output: Hey, can you help me with this real quick?

    Input: I'm not going to do that. Please don't scroll. I'm just trying to become a big content creator one day. I have no supporters.
    Output: I'm not going to do that. Please don't scroll. I'm just trying to become a big content creator one day. I have no supporters.

    Input: what time is it
    Output: What time is it?

    Now clean the next input:
  min_word_count: 10
  # Sampling knobs. Omit any field to let the backend use its default.
  # OpenAI-standard (honored on all backends): temperature, top_p,
  # frequency_penalty, presence_penalty, stop.
  # Non-standard (honored by Lemonade / llama.cpp, ignored by OpenAI
  # Cloud): min_p, repetition_penalty. Note: `seed` is NOT supported —
  # Lemonade's onnxruntime-genai backend accepts the field but does not
  # thread it to the sampler.
  temperature: 0.2
  # top_p: 0.9
  # min_p: 0.05
  # frequency_penalty: 0.4
  # presence_penalty: 0.0
  # repetition_penalty: 1.1
  # stop: ["\nInput:", "Here is", "Here's", "Sure,", "I understand", "Output:"]

telemetry:
  enabled: false
  endpoint: localhost:4317

yaml_indent: 2
